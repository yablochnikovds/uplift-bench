# @package _global_
#
# Full benchmark settings. Run via Hydra multirun across the model axis:
#
#   uv run uplift-bench benchmark -m \
#     +experiment=full_benchmark \
#     model=s_learner,t_learner,x_learner,r_learner,dr_learner,class_transformation,causal_forest \
#     dataset=hillstrom,criteo,retailhero,megafon \
#     seed=42,43,44

bootstrap:
  n_boot: 1000
  method: bca
  n_jobs: -1

robustness:
  enable_permutation: true
  permutation_n_repeats: 10
  enable_feature_drop: false        # too slow for matrix runs
  enable_learning_curve: true
  enable_overlap: true
