dataset:
  name: hillstrom
  data_dir: data/sample
  loader_params:
    treatment_arm: Womens E-Mail
    outcome: visit
model:
  name: s_learner
  extra_params: {}
base_learner:
  name: logreg
  params:
    max_iter: 1000
seed: 42
output_dir: outputs
split:
  train_frac: 0.7
  val_frac: 0.15
  seed: ${seed}
bootstrap:
  n_boot: 100
  method: percentile
  alpha: 0.05
  n_jobs: 1
  seed: ${seed}
robustness:
  enable_permutation: false
  permutation_n_repeats: 5
  enable_feature_drop: false
  enable_learning_curve: false
  learning_curve_fractions:
  - 0.25
  - 0.5
  - 0.75
  - 1.0
  enable_overlap: false
tracking:
  enabled: true
  experiment_name: uplift-bench
  tracking_uri: file://./mlruns
  run_name: null
