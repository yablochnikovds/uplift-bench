name: docker

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "configs/**"
      - ".github/workflows/docker.yml"
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "configs/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: uplift-bench:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: smoke run inside container
        run: |
          docker run --rm uplift-bench:ci info
          docker run --rm uplift-bench:ci --help
